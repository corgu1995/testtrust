# ============================================================================
# testtrust — composite GitHub Action
#
# Grade whether your tests actually test anything, right in CI. This wraps the
# testtrust CLI so consumers add a single step:
#
#   - uses: corgu1995/testtrust@v0.1.2
#     with:
#       base: origin/${{ github.base_ref }}   # diff mode (recommended on PRs)
#       fail-under: '60'
#
# On pull_request events it ALSO posts a single STICKY comment with a markdown
# report (created once, updated in place on every re-run — never duplicated).
# That requires the consumer workflow to grant `pull-requests: write` — see the
# README snippet for a ready-to-copy example.
#
# NOTE ON PACKAGING: npm publish is intentionally deferred, so this action does
# NOT `npx testtrust`. Instead it builds testtrust from its OWN checked-out
# source (the copy of this repo that GitHub fetches when it resolves
# `uses: corgu1995/testtrust@...`, exposed as ${{ github.action_path }}) and then
# runs the compiled `dist/cli.js` against the CONSUMER's repository.
# ============================================================================
name: testtrust
description: >-
  Grade whether your tests actually test anything. Catches AI/agent
  test-gaming (assertion-free, tautological, over-mocked, and silently-weakened
  tests) on the diff, before false-green CI ships a bug. On pull requests it
  posts a sticky markdown report comment.
author: Santiago Parra

branding:
  icon: shield
  color: green

# ---------------------------------------------------------------------------
# Inputs — each maps to a CLI flag. Empty-string defaults mean "don't pass the
# flag at all" so the CLI's own defaults apply (see the run step below).
# ---------------------------------------------------------------------------
inputs:
  base:
    description: >-
      Git ref to diff against. Setting this enables diff mode and the
      regression rules (weakened / deleted / skipped assertions). Maps to
      `--base`. Example: `origin/main`. Empty = files mode.
      Requires `actions/checkout` with `fetch-depth: 0` so the base ref is
      present.
    required: false
    default: ''
  files:
    description: >-
      Space-separated test file globs/paths to scan (files mode). Passed as
      positional arguments to the CLI. Ignored by the CLI when `base` is set.
      Example: `"src/**/*.test.ts test/**/*.test.ts"`. Empty = let diff mode
      pick the changed test files.
    required: false
    default: ''
  fail-under:
    description: >-
      Score (0-100) at or under which the verdict becomes `fail` (which fails
      this step). Maps to `--fail-under`.
    required: false
    default: '60'
  format:
    description: >-
      Output format for the run that is printed to the build log: `human`
      (default) or `json`. Maps to `--format`. (Regardless of this value, the
      action always derives the `score`/`verdict` outputs from an internal JSON
      pass, so they are populated either way. The sticky PR comment is rendered
      from a separate `--format markdown` pass and is independent of this.)
    required: false
    default: 'human'
  rules:
    description: >-
      Enable ONLY the listed rule(s) (an allowlist); everything else is turned
      off. Space-separated, each `id` or `id:severity`. Maps to one repeated
      `--rule` flag per entry. Example: `"assertion-weakened tautology:warn"`.
      Empty = all rules on.
    required: false
    default: ''
  disable:
    description: >-
      Rule id(s) to disable. Space-separated; maps to one repeated `--disable`
      flag per entry. Example: `"trivial-assertion snapshot-only"`. Empty =
      disable nothing.
    required: false
    default: ''
  comment:
    description: >-
      Whether to upsert the sticky markdown report comment on pull_request
      events. `true` (default) posts/updates the comment; `false` skips it
      (the gate and outputs are unaffected). The comment is always best-effort
      and never fails the job; on non-PR events it is skipped automatically.
    required: false
    default: 'true'

# ---------------------------------------------------------------------------
# Outputs — surfaced from the internal JSON pass so they are always set, even
# when the gate fails.
# ---------------------------------------------------------------------------
outputs:
  score:
    description: The 0-100 Test-Trust score.
    value: ${{ steps.testtrust.outputs.score }}
  verdict:
    description: The gate verdict — `pass`, `neutral`, or `fail`.
    value: ${{ steps.testtrust.outputs.verdict }}

runs:
  using: composite
  steps:
    # 1) Node toolchain. testtrust targets Node >= 18.18 and is developed on 22.
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # 2) Build testtrust from the action's OWN checkout (github.action_path),
    #    NOT from the consumer's working directory. We install dev deps
    #    (typescript etc.) so `npm run build` can compile to dist/.
    #    `npm ci` requires the committed package-lock.json, which ships with the
    #    action. Bash so the heredoc-free one-liners are portable on Linux/macOS.
    - name: Build testtrust (from action source)
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        npm ci
        npm run build

    # 3) Run testtrust against the CONSUMER's repository.
    #
    #    `working-directory` defaults to the caller's checkout (the GitHub
    #    default working directory), so globs and the git diff resolve against
    #    THEIR code — while we invoke the CLI by absolute path out of the
    #    action's own dist/.
    #
    #    Flag assembly: we build an argv array and only append a flag when its
    #    input is non-empty, so the CLI's documented defaults apply otherwise.
    #    `rules`, `disable`, and `files` are split on whitespace into repeated
    #    flags / positional args.
    #
    #    Outputs: we ALWAYS run once in JSON (non-gating, so a `fail` verdict
    #    can't abort before we publish outputs), parse score+verdict with node,
    #    and write them to $GITHUB_OUTPUT. Then, when the requested format is
    #    `human`, we render a second human-readable pass to the log. Finally we
    #    exit non-zero IFF the verdict is `fail`, preserving the CLI's gate
    #    contract (0 = pass/neutral, 1 = fail).
    - name: Run testtrust
      id: testtrust
      shell: bash
      env:
        TT_BASE: ${{ inputs.base }}
        TT_FILES: ${{ inputs.files }}
        TT_FAIL_UNDER: ${{ inputs.fail-under }}
        TT_FORMAT: ${{ inputs.format }}
        TT_RULES: ${{ inputs.rules }}
        TT_DISABLE: ${{ inputs.disable }}
        TT_CLI: ${{ github.action_path }}/dist/cli.js
      run: |
        set -euo pipefail

        # Assemble the flags that are common to every invocation (everything
        # except --format, which differs between the JSON and human passes).
        common_args=()
        [ -n "$TT_BASE" ]       && common_args+=( --base "$TT_BASE" )
        [ -n "$TT_FAIL_UNDER" ] && common_args+=( --fail-under "$TT_FAIL_UNDER" )

        # Repeatable --rule (one per whitespace-separated entry).
        if [ -n "$TT_RULES" ]; then
          for r in $TT_RULES; do common_args+=( --rule "$r" ); done
        fi
        # Repeatable --disable.
        if [ -n "$TT_DISABLE" ]; then
          for d in $TT_DISABLE; do common_args+=( --disable "$d" ); done
        fi
        # Positional file globs/paths (files mode). Left unsplit-quoted on
        # purpose so each glob becomes its own argument.
        files_args=()
        if [ -n "$TT_FILES" ]; then
          for f in $TT_FILES; do files_args+=( "$f" ); done
        fi

        # --- Authoritative JSON pass: never aborts the step (|| true) so we can
        #     always publish outputs, even on a failing verdict. ---
        json_out="$(node "$TT_CLI" "${files_args[@]}" "${common_args[@]}" --format json || true)"

        # Echo the raw JSON when that's the requested format (so the log still
        # shows something meaningful before we re-derive outputs).
        if [ "$TT_FORMAT" = "json" ]; then
          printf '%s\n' "$json_out"
        fi

        # Parse score + verdict with node (always present via setup-node). If
        # parsing fails for any reason, fall back to empty/neutral rather than
        # crashing the action.
        score="$(printf '%s' "$json_out"   | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{process.stdout.write(String(JSON.parse(s).score.score))}catch{process.stdout.write("")}})')"
        verdict="$(printf '%s' "$json_out" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{process.stdout.write(String(JSON.parse(s).score.verdict))}catch{process.stdout.write("neutral")}})')"

        {
          echo "score=$score"
          echo "verdict=$verdict"
        } >> "$GITHUB_OUTPUT"

        echo "testtrust: score=$score verdict=$verdict"

        # --- Human pass for the log (only when not already showing JSON). This
        #     run is non-gating too; the verdict below decides the exit code. ---
        if [ "$TT_FORMAT" != "json" ]; then
          node "$TT_CLI" "${files_args[@]}" "${common_args[@]}" --format human || true
        fi

        # --- Gate: fail the step iff the verdict is `fail`. ---
        if [ "$verdict" = "fail" ]; then
          echo "::error::testtrust verdict is FAIL (score $score, fail-under $TT_FAIL_UNDER)"
          exit 1
        fi

    # 4) Render the markdown report for the sticky PR comment.
    #
    #    Runs only on pull_request events, and `if: always()` so it still
    #    produces the report after the gate step above exits 1 on a FAIL
    #    verdict (we WANT the comment most when the gate is red).
    #
    #    The CLI's `--format markdown` prints a markdown report whose FIRST line
    #    is the marker `<!-- testtrust-report -->` (used by the next step to
    #    find-and-update the existing comment). We capture stdout to a file and
    #    deliberately do NOT let a non-zero CLI exit (e.g. a FAIL verdict, which
    #    exits 1) abort the step: we snapshot `$?` separately instead of piping,
    #    so the redirect always lands a complete file. We then export the file
    #    PATH via $GITHUB_OUTPUT for the github-script step to read.
    - name: Render markdown report
      id: report
      if: ${{ always() && github.event_name == 'pull_request' && inputs.comment == 'true' }}
      shell: bash
      env:
        TT_BASE: ${{ inputs.base }}
        TT_FILES: ${{ inputs.files }}
        TT_FAIL_UNDER: ${{ inputs.fail-under }}
        TT_RULES: ${{ inputs.rules }}
        TT_DISABLE: ${{ inputs.disable }}
        TT_CLI: ${{ github.action_path }}/dist/cli.js
        # A stable, run-scoped path that survives between steps via the runner
        # workspace. RUNNER_TEMP is always writable and cleaned up per job.
        TT_REPORT_FILE: ${{ runner.temp }}/testtrust-report.md
      run: |
        set -uo pipefail   # NOTE: no `-e` — a FAIL verdict makes the CLI exit 1
                           # and we must keep going to still post the comment.

        # Re-derive the same argv the gating run used (shell state does not
        # persist across steps). Identical assembly to the "Run testtrust" step.
        common_args=()
        [ -n "$TT_BASE" ]       && common_args+=( --base "$TT_BASE" )
        [ -n "$TT_FAIL_UNDER" ] && common_args+=( --fail-under "$TT_FAIL_UNDER" )
        if [ -n "$TT_RULES" ]; then
          for r in $TT_RULES; do common_args+=( --rule "$r" ); done
        fi
        if [ -n "$TT_DISABLE" ]; then
          for d in $TT_DISABLE; do common_args+=( --disable "$d" ); done
        fi
        files_args=()
        if [ -n "$TT_FILES" ]; then
          for f in $TT_FILES; do files_args+=( "$f" ); done
        fi

        # Capture stdout to the report file. Capture the exit code SEPARATELY so
        # a non-zero CLI exit (FAIL verdict / runtime error) does not abort us.
        node "$TT_CLI" "${files_args[@]}" "${common_args[@]}" --format markdown \
          > "$TT_REPORT_FILE"
        rc=$?
        echo "markdown render exited rc=$rc"

        # Guarantee a non-empty body even if the CLI produced nothing (e.g. a
        # usage/runtime error exit). Keep the marker on the FIRST line so the
        # upsert step can still find and update the sticky comment.
        if [ ! -s "$TT_REPORT_FILE" ]; then
          {
            echo "<!-- testtrust-report -->"
            echo ""
            echo "### testtrust"
            echo ""
            echo "_Report generation failed (CLI exit code \`$rc\`); see the job log for details._"
          } > "$TT_REPORT_FILE"
        fi

        # Hand the path to the github-script step.
        echo "file=$TT_REPORT_FILE" >> "$GITHUB_OUTPUT"

    # 5) Upsert the STICKY comment on the PR.
    #
    #    Find an existing ISSUE comment whose body contains the marker
    #    `<!-- testtrust-report -->` and UPDATE it; otherwise CREATE one. This
    #    keeps exactly one testtrust comment per PR — re-runs edit in place
    #    instead of spamming new comments.
    #
    #    `continue-on-error: true` (plus `if: always()`) means this step can
    #    NEVER fail the job: a missing `pull-requests: write` permission, an API
    #    hiccup, etc. is logged and swallowed — the gate's pass/fail still comes
    #    solely from the "Run testtrust" step's exit code.
    - name: Upsert sticky PR comment
      if: ${{ always() && github.event_name == 'pull_request' && inputs.comment == 'true' }}
      continue-on-error: true
      uses: actions/github-script@v7
      env:
        REPORT_FILE: ${{ steps.report.outputs.file }}
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- testtrust-report -->';

          // The PR number is on the event payload for pull_request events.
          const issue_number = context.payload.pull_request?.number;
          if (!issue_number) {
            core.info('No pull_request number in context; skipping sticky comment.');
            return;
          }

          // Read the rendered markdown (path handed over by the previous step).
          const file = process.env.REPORT_FILE;
          let body;
          try {
            body = fs.readFileSync(file, 'utf8');
          } catch (err) {
            core.warning(`Could not read report file "${file}": ${err.message}`);
            return;
          }
          // Defensively ensure the marker is present so future runs can find us.
          if (!body.includes(marker)) {
            body = `${marker}\n\n${body}`;
          }

          const { owner, repo } = context.repo;

          // Look for our existing sticky comment (paginate to be safe on busy PRs).
          const existing = await github.paginate(
            github.rest.issues.listComments,
            { owner, repo, issue_number, per_page: 100 },
          );
          const mine = existing.find((c) => c.body && c.body.includes(marker));

          if (mine) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: mine.id, body,
            });
            core.info(`Updated sticky testtrust comment (id ${mine.id}).`);
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number, body,
            });
            core.info('Created sticky testtrust comment.');
          }
