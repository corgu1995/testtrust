name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Regression/integration tests diff against git history (HEAD~1),
          # so we need the full history, not a shallow clone.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      # Dogfood: run the freshly built tool on its own test suite (files mode).
      # testtrust must stay clean on itself — this should pass (exit 0) and
      # guards against regressions that would make the tool flag its own tests.
      - run: node dist/cli.js "test/**/*.test.ts"
      - run: npm test
